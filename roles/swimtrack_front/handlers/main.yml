---
- name: Restart SwimTrack front
  ansible.builtin.systemd_service:
    name: "{{ swimtrack_front_service_name }}"
    scope: user
    daemon_reload: true
    enabled: true
    state: restarted
  environment: "{{ swimtrack_front_systemd_environment }}"

- name: Validate the Apache configuration
  ansible.builtin.command:
    argv:
      - apache2ctl
      - -t
  become: true
  changed_when: false
  listen: Validate and reload the SwimTrack Apache proxy

- name: Reload Apache after validation
  ansible.builtin.systemd_service:
    name: apache2
    state: reloaded
  become: true
  listen: Validate and reload the SwimTrack Apache proxy
