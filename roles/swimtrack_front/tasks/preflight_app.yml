---
- name: Inspect required application paths
  ansible.builtin.stat:
    path: "{{ item }}"
  loop:
    - "{{ swimtrack_front_repo_dir }}/.git"
    - "{{ swimtrack_front_repo_dir }}/app.py"
    - "{{ swimtrack_front_repo_dir }}/gunicorn.conf.py"
    - "{{ swimtrack_front_repo_dir }}/requirements.txt"
  register: swimtrack_front_app_paths

- name: Assert required application paths exist
  ansible.builtin.assert:
    that:
      - swimtrack_front_app_paths.results | map(attribute='stat.exists') | min
    fail_msg: "The remote front checkout is incomplete."

- name: Inspect the remote Git worktree
  ansible.builtin.command:
    argv:
      - git
      - -C
      - "{{ swimtrack_front_repo_dir }}"
      - status
      - --porcelain
  register: swimtrack_front_git_status
  changed_when: false
  check_mode: false

- name: Refuse to overwrite remote Git changes
  ansible.builtin.assert:
    that:
      - swimtrack_front_git_status.stdout | trim == ""
    fail_msg: "The remote front checkout has local changes. Preserve or commit them before deployment."
