---
- name: Inspect the shared AI authentication token on the controller
  ansible.builtin.stat:
    path: "{{ swimtrack_front_vision_auth_token_file }}"
  register: swimtrack_front_vision_auth_token_file_stat
  delegate_to: localhost
  run_once: true
  no_log: true
  when:
    - swimtrack_front_require_vision_auth_token | bool
    - swimtrack_front_vision_auth_token | length == 0

- name: Require the shared AI authentication token on the controller
  ansible.builtin.assert:
    that:
      - swimtrack_front_vision_auth_token_file_stat.stat.exists
      - swimtrack_front_vision_auth_token_file_stat.stat.isreg
    fail_msg: "The shared SwimTrack AI authentication token is unavailable on the Ansible controller. Deploy AI first or provide swimtrack_front_vision_auth_token securely."
  no_log: true
  when:
    - swimtrack_front_require_vision_auth_token | bool
    - swimtrack_front_vision_auth_token | length == 0

- name: Load the shared AI authentication token
  ansible.builtin.set_fact:
    swimtrack_front_vision_auth_token: "{{ lookup('ansible.builtin.file', swimtrack_front_vision_auth_token_file) | trim }}"
  no_log: true
  when:
    - swimtrack_front_require_vision_auth_token | bool
    - swimtrack_front_vision_auth_token | length == 0

- name: Require a configured AI authentication token
  ansible.builtin.assert:
    that:
      - swimtrack_front_vision_auth_token | length > 0
    fail_msg: "A non-empty SwimTrack AI authentication token is required for this Front deployment."
  no_log: true
  when: swimtrack_front_require_vision_auth_token | bool
