---
- name: Deploy the local SwimTrack AI worktree overlay
  hosts: gpu_hosts
  gather_facts: true
  any_errors_fatal: true
  vars:
    local_worktree: "{{ playbook_dir }}/../../swimtrack-ai"
    remote_worktree: /home/grupo1/swimtrack/swimtrack-ai
    environment_file: /home/grupo1/.config/swimtrack-ai/swimtrack-ai.env
    service_name: swimtrack-ai.service
    systemd_user_environment:
      XDG_RUNTIME_DIR: "/run/user/{{ ansible_facts['user_uid'] }}"
      DBUS_SESSION_BUS_ADDRESS: "unix:path=/run/user/{{ ansible_facts['user_uid'] }}/bus"
    runtime_files:
      - src/swimtrack_ai/api.py
      - src/swimtrack_ai/calibration.py
      - src/swimtrack_ai/config.py
      - src/swimtrack_ai/detectors/__init__.py
      - src/swimtrack_ai/detectors/base.py
      - src/swimtrack_ai/detectors/fake.py
      - src/swimtrack_ai/detectors/tensorrt.py
      - src/swimtrack_ai/lap_analysis.py
      - src/swimtrack_ai/schemas.py
      - src/swimtrack_ai/service.py
      - src/swimtrack_ai/tracker.py
    tracker_environment:
      SWIMTRACK_DIAGNOSTIC_SCORE_FLOOR: "0.05"
      SWIMTRACK_SCORE_THRESHOLD: "0.15"
      SWIMTRACK_MIN_BOX_AREA: "250"
      SWIMTRACK_TRACK_THRESHOLD: "0.45"
      SWIMTRACK_TRACK_BUFFER: "60"
      SWIMTRACK_MATCH_THRESHOLD: "0.80"
      SWIMTRACK_MOT20: "false"
      SWIMTRACK_LANE_ROI_ENABLED: "true"
  tasks:
    - name: Verify the local AI runtime files
      ansible.builtin.stat:
        path: "{{ local_worktree }}/{{ item }}"
      loop: "{{ runtime_files }}"
      register: local_ai_files
      delegate_to: localhost

    - name: Require every local AI runtime file
      ansible.builtin.assert:
        that:
          - local_ai_files.results | map(attribute='stat.exists') | min
          - local_ai_files.results | map(attribute='stat.isreg') | min

    - name: Copy the local AI runtime overlay
      ansible.builtin.copy:
        src: "{{ local_worktree }}/{{ item }}"
        dest: "{{ remote_worktree }}/{{ item }}"
        mode: "0644"
      loop: "{{ runtime_files }}"
      register: ai_overlay

    - name: Configure the worktree tracker defaults
      ansible.builtin.lineinfile:
        path: "{{ environment_file }}"
        regexp: "^{{ item.key }}="
        line: "{{ item.key }}={{ item.value }}"
        mode: "0600"
      loop: "{{ tracker_environment | dict2items }}"
      register: ai_tracker_environment

    - name: Restart the AI user service after an overlay change
      ansible.builtin.systemd_service:
        name: "{{ service_name }}"
        scope: user
        state: restarted
      environment: "{{ systemd_user_environment }}"
      when: >-
        (ai_overlay.results | selectattr('changed') | list | length > 0)
        or ai_tracker_environment.changed

    - name: Wait for the overlaid AI service
      ansible.builtin.uri:
        url: http://10.0.218.101:7001/readyz
        method: GET
        status_code: 200
        return_content: true
      register: ai_ready
      until: ai_ready.status | default(0) == 200
      retries: 60
      delay: 2

    - name: Require the TensorRT backend after the overlay
      ansible.builtin.assert:
        that:
          - ai_ready.json.status == 'ready'
          - ai_ready.json.backend == 'tensorrt'

- name: Deploy the local SwimTrack Front worktree overlay
  hosts: front_hosts
  gather_facts: true
  any_errors_fatal: true
  vars:
    local_worktree: "{{ playbook_dir }}/../../swimtrack-front"
    remote_worktree: /home/grupo1/swimtrack/swimtrack-front
    environment_file: /home/grupo1/.config/swimtrack-front/swimtrack-front.env
    tracking_diagnostics: counts
    lap_episode_mode: shadow
    service_name: swimtrack-front.service
    systemd_user_environment:
      XDG_RUNTIME_DIR: "/run/user/{{ ansible_facts['user_uid'] }}"
      DBUS_SESSION_BUS_ADDRESS: "unix:path=/run/user/{{ ansible_facts['user_uid'] }}/bus"
    runtime_files:
      - app.py
      - config.py
      - lap_episode_reducer.py
      - remote_detector.py
  tasks:
    - name: Verify the local Front runtime files
      ansible.builtin.stat:
        path: "{{ local_worktree }}/{{ item }}"
      loop: "{{ runtime_files }}"
      register: local_front_files
      delegate_to: localhost

    - name: Require every local Front runtime file
      ansible.builtin.assert:
        that:
          - local_front_files.results | map(attribute='stat.exists') | min
          - local_front_files.results | map(attribute='stat.isreg') | min

    - name: Copy the local Front runtime overlay
      ansible.builtin.copy:
        src: "{{ local_worktree }}/{{ item }}"
        dest: "{{ remote_worktree }}/{{ item }}"
        mode: "0644"
      loop: "{{ runtime_files }}"
      register: front_overlay

    - name: Enable the fixed-camera lap calibration
      ansible.builtin.lineinfile:
        path: "{{ environment_file }}"
        regexp: '^VISION_LAP_CALIBRATION_ID='
        line: VISION_LAP_CALIBRATION_ID=fixed-camera-v1
        mode: "0600"
      register: front_lap_environment

    - name: Enable tracking diagnostics for worktree experiments
      ansible.builtin.lineinfile:
        path: "{{ environment_file }}"
        regexp: '^VISION_TRACKING_DIAGNOSTICS='
        line: "VISION_TRACKING_DIAGNOSTICS={{ tracking_diagnostics }}"
        mode: "0600"
      register: front_diagnostics_environment

    - name: Enable the shadow lap episode reducer
      ansible.builtin.lineinfile:
        path: "{{ environment_file }}"
        regexp: '^LAP_EPISODE_MODE='
        line: "LAP_EPISODE_MODE={{ lap_episode_mode }}"
        mode: "0600"
      register: front_lap_episode_environment

    - name: Leave the lap confidence threshold unconfigured
      ansible.builtin.lineinfile:
        path: "{{ environment_file }}"
        regexp: '^LAP_CONFIDENCE_THRESHOLD='
        state: absent
        mode: "0600"
      register: front_lap_threshold_environment

    - name: Restart the Front user service after an overlay change
      ansible.builtin.systemd_service:
        name: "{{ service_name }}"
        scope: user
        state: restarted
      environment: "{{ systemd_user_environment }}"
      when: >-
        front_lap_environment.changed
        or front_diagnostics_environment.changed
        or front_lap_episode_environment.changed
        or front_lap_threshold_environment.changed
        or (front_overlay.results | selectattr('changed') | list | length > 0)

    - name: Wait for the overlaid Front service
      ansible.builtin.uri:
        url: http://127.0.0.1:7101/swimtrack/
        method: GET
        status_code: 200
        return_content: false
      register: front_ready
      until: front_ready.status | default(0) == 200
      retries: 30
      delay: 2

    - name: Verify the Apache publication after the overlay
      ansible.builtin.uri:
        url: http://127.0.0.1/swimtrack/
        method: GET
        status_code: 200
        return_content: false
