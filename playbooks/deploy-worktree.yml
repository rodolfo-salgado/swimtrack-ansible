---
- name: Deploy the local SwimTrack AI worktree overlay
  hosts: gpu_hosts
  gather_facts: true
  any_errors_fatal: true
  vars:
    local_worktree: "{{ playbook_dir }}/../../swimtrack-ai"
    remote_worktree: /home/grupo1/swimtrack/swimtrack-ai
    environment_file: /home/grupo1/.config/swimtrack-ai/swimtrack-ai.env
    service_name: swimtrack-ai.service
    systemd_user_environment:
      XDG_RUNTIME_DIR: "/run/user/{{ ansible_facts['user_uid'] }}"
      DBUS_SESSION_BUS_ADDRESS: "unix:path=/run/user/{{ ansible_facts['user_uid'] }}/bus"
    runtime_files:
      - src/swimtrack_ai/api.py
      - src/swimtrack_ai/calibration.py
      - src/swimtrack_ai/config.py
      - src/swimtrack_ai/detectors/__init__.py
      - src/swimtrack_ai/detectors/base.py
      - src/swimtrack_ai/detectors/fake.py
      - src/swimtrack_ai/detectors/tensorrt.py
      - src/swimtrack_ai/identity.py
      - src/swimtrack_ai/lap_analysis.py
      - src/swimtrack_ai/schemas.py
      - src/swimtrack_ai/service.py
      - src/swimtrack_ai/tracker.py
    tracker_environment:
      SWIMTRACK_DIAGNOSTIC_SCORE_FLOOR: "0.05"
      SWIMTRACK_SCORE_THRESHOLD: "0.15"
      SWIMTRACK_MIN_BOX_AREA: "250"
      SWIMTRACK_TRACK_THRESHOLD: "0.45"
      SWIMTRACK_TRACK_BUFFER: "60"
      SWIMTRACK_MATCH_THRESHOLD: "0.80"
      SWIMTRACK_MOT20: "false"
      SWIMTRACK_LANE_ROI_ENABLED: "true"
      SWIMTRACK_WEAK_REACTIVATION_ENABLED: "true"
      SWIMTRACK_WEAK_REACTIVATION_SCORE_THRESHOLD: "0.10"
      SWIMTRACK_WEAK_REACTIVATION_MIN_BOX_AREA: "64"
      SWIMTRACK_WEAK_REACTIVATION_MAX_GAP_SECONDS: "1.0"
      SWIMTRACK_WEAK_REACTIVATION_MAX_CENTER_DISTANCE: "0.10"
      SWIMTRACK_FAR_CROP_ENABLED: "true"
      SWIMTRACK_FAR_CROP_LEFT: "0.2962962963"
      SWIMTRACK_FAR_CROP_TOP: "0.1111111111"
      SWIMTRACK_FAR_CROP_RIGHT: "0.7037037037"
      SWIMTRACK_FAR_CROP_BOTTOM: "0.5185185185"
      SWIMTRACK_FAR_CROP_NMS_THRESHOLD: "0.50"
      SWIMTRACK_IDENTITY_CONFIRMATION_OBSERVATIONS: "3"
      SWIMTRACK_IDENTITY_CONFIRMATION_SECONDS: "0.20"
      SWIMTRACK_IDENTITY_CONFIRMATION_CONFIDENCE: "0.18"
      SWIMTRACK_IDENTITY_TENTATIVE_MAX_GAP_SECONDS: "0.75"
      SWIMTRACK_IDENTITY_MAX_REASSOCIATION_GAP_SECONDS: "12.0"
      SWIMTRACK_IDENTITY_MAX_SPEED_PER_SECOND: "0.07"
      SWIMTRACK_IDENTITY_POSITION_SLACK: "0.08"
      SWIMTRACK_IDENTITY_MAX_LANE_X_DELTA: "0.22"
      SWIMTRACK_IDENTITY_DUPLICATE_IOU: "0.45"
      SWIMTRACK_IDENTITY_DUPLICATE_POSITION_DELTA: "0.08"
      SWIMTRACK_IDENTITY_DUPLICATE_LANE_X_DELTA: "0.15"
      SWIMTRACK_IDENTITY_ADDITIONAL_MIN_POSITION_SPAN: "0.10"
      SWIMTRACK_IDENTITY_ADDITIONAL_COOCCURRENCE_MAX_GAP_SECONDS: "0.25"
      SWIMTRACK_IDENTITY_MAX_PER_LANE: "2"
  tasks:
    - name: Verify the local AI runtime files
      ansible.builtin.stat:
        path: "{{ local_worktree }}/{{ item }}"
      loop: "{{ runtime_files }}"
      register: local_ai_files
      delegate_to: localhost

    - name: Require every local AI runtime file
      ansible.builtin.assert:
        that:
          - local_ai_files.results | map(attribute='stat.exists') | min
          - local_ai_files.results | map(attribute='stat.isreg') | min

    - name: Copy the local AI runtime overlay
      ansible.builtin.copy:
        src: "{{ local_worktree }}/{{ item }}"
        dest: "{{ remote_worktree }}/{{ item }}"
        mode: "0644"
      loop: "{{ runtime_files }}"
      register: ai_overlay

    - name: Configure the worktree tracker defaults
      ansible.builtin.lineinfile:
        path: "{{ environment_file }}"
        regexp: "^{{ item.key }}="
        line: "{{ item.key }}={{ item.value }}"
        mode: "0600"
      loop: "{{ tracker_environment | dict2items }}"
      register: ai_tracker_environment

    - name: Restart the AI user service after an overlay change
      ansible.builtin.systemd_service:
        name: "{{ service_name }}"
        scope: user
        state: restarted
      environment: "{{ systemd_user_environment }}"
      when: >-
        (ai_overlay.results | selectattr('changed') | list | length > 0)
        or ai_tracker_environment.changed

    - name: Wait for the overlaid AI service
      ansible.builtin.uri:
        url: http://10.0.218.101:7001/readyz
        method: GET
        status_code: 200
        return_content: true
      register: ai_ready
      until: ai_ready.status | default(0) == 200
      retries: 60
      delay: 2

    - name: Require the TensorRT backend after the overlay
      ansible.builtin.assert:
        that:
          - ai_ready.json.status == 'ready'
          - ai_ready.json.backend == 'tensorrt'

- name: Validate the local SwimTrack Front release checkout and deploy the configured revision
  hosts: front_hosts
  gather_facts: true
  any_errors_fatal: true
  vars:
    local_worktree: "{{ playbook_dir }}/../../swimtrack-front"
    local_front_expected_branch: main
  tasks:
    - name: Read the local Front revision
      ansible.builtin.command:
        argv:
          - git
          - -C
          - "{{ local_worktree }}"
          - rev-parse
          - HEAD
      register: local_front_revision
      delegate_to: localhost
      changed_when: false

    - name: Read the local Front branch
      ansible.builtin.command:
        argv:
          - git
          - -C
          - "{{ local_worktree }}"
          - branch
          - --show-current
      register: local_front_branch
      delegate_to: localhost
      changed_when: false

    - name: Inspect the local Front worktree
      ansible.builtin.command:
        argv:
          - git
          - -C
          - "{{ local_worktree }}"
          - status
          - --porcelain
      register: local_front_status
      delegate_to: localhost
      changed_when: false

    - name: Require a clean local Front main worktree
      ansible.builtin.assert:
        that:
          - local_front_branch.stdout | trim == local_front_expected_branch
          - local_front_status.stdout | trim == ''
        fail_msg: >-
          The local Front worktree must be clean and checked out on
          {{ local_front_expected_branch }} before deployment.
      delegate_to: localhost

    - name: Read the published Front main revision
      ansible.builtin.command:
        argv:
          - git
          - -C
          - "{{ local_worktree }}"
          - ls-remote
          - --exit-code
          - origin
          - "refs/heads/{{ local_front_expected_branch }}"
      register: published_front_ref
      delegate_to: localhost
      changed_when: false

    - name: Extract the published Front revision
      ansible.builtin.set_fact:
        published_front_revision: "{{ published_front_ref.stdout | regex_search('^[0-9a-f]{40}') }}"

    - name: Require the local Front revision to match the configured release
      ansible.builtin.assert:
        that:
          - published_front_revision == (local_front_revision.stdout | trim)
          - swimtrack_front_revision == (local_front_revision.stdout | trim)
        fail_msg: >-
          The local Front HEAD must be the published tip of
          origin/{{ local_front_expected_branch }} and match swimtrack_front_revision.
          Update inventory/group_vars/front_hosts.yml with the published commit before deployment.
      delegate_to: localhost

    - name: Deploy the configured Front revision through the standard role
      ansible.builtin.include_role:
        name: swimtrack_front
